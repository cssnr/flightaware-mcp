version: "3.8"

services:
  nginx:
    image: ghcr.io/cssnr/docker-nginx-proxy:latest
    environment:
      SERVICE_NAME: "app"
      SERVICE_PORT: "8000"
      BASIC_AUTH: ${BASIC_AUTH}
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 64M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.${STACK_NAME?err}.rule=Host(`${TRAEFIK_HOST?err}`)"
        - "traefik.http.routers.${STACK_NAME}.entrypoints=https"
        - "traefik.http.routers.${STACK_NAME}.tls=true"
        - "traefik.http.services.${STACK_NAME}.loadbalancer.server.port=80"
        #- "traefik.http.routers.${STACK_NAME}.tls.certresolver=le"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf localhost:80/health-check || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - app
    networks:
      - internal
      - traefik-public

  app:
    image: ghcr.io/cssnr/flightaware-mcp:${VERSION:-latest}
    environment:
      VERSION: ${VERSION}
      STACK_NAME: ${STACK_NAME}
      TRAEFIK_HOST: ${TRAEFIK_HOST}
      AEROAPI_KEY: ${AEROAPI_KEY}
      # NOTE: We have to re-define the defaults to allow passthrough - thanks portainer
      HISHEL_CACHE_PATH: ${HISHEL_CACHE_PATH:-/data/hishel_cache.db}
      HISHEL_CACHE_TTL: ${HISHEL_CACHE_TTL:-60}
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "2.0"
          memory: 256M
    #healthcheck:
    #  test: ["CMD-SHELL", "curl -sf localhost:8000/app-health-check || exit 1"]
    #  interval: 30s
    #  timeout: 10s
    #  retries: 3
    #  start_period: 30s
    networks:
      - internal
    volumes:
      - data_dir:/data

networks:
  internal:
    driver: overlay
  traefik-public:
    external: true

volumes:
  data_dir:
